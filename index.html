<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horarios — Boutique de la Plage</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg:#f7f6f2; --surface:#fff; --border:#e4e2da; --border2:#ccc9be;
    --text:#1a1916; --muted:#7a7870; --accent:#2a5fa5;
    --M-bg:#deeaf8; --M-text:#1a3d6e; --M-border:#a8c8ee;
    --T-bg:#fae5d8; --T-text:#7a2e0e; --T-border:#f0b89a;
    --OFF-bg:#efefeb; --OFF-text:#7a7870; --OFF-border:#d4d2ca;
    --radius:8px; --radius-lg:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1.5rem;}

  .hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.75rem;gap:1rem;flex-wrap:wrap;}
  .hdr h1{font-size:22px;font-weight:600;letter-spacing:-.3px;}
  .hdr p{font-size:13px;color:var(--muted);margin-top:3px;}
  .hdr-btns{display:flex;gap:8px;flex-wrap:wrap;}

  .btn{padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;color:var(--text);display:inline-flex;align-items:center;gap:6px;transition:background .15s;}
  .btn:hover{background:var(--border);}
  .btn-primary{background:var(--text);color:#fff;border-color:var(--text);}
  .btn-primary:hover{background:#333;}
  .btn-danger{background:#fee;color:#a00;border-color:#fbb;}
  .btn-danger:hover{background:#fdd;}
  .btn-sm{padding:4px 10px;font-size:12px;}

  .tabs{display:flex;gap:4px;margin-bottom:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;width:fit-content;flex-wrap:wrap;}
  .tab{padding:6px 16px;border-radius:6px;border:none;background:transparent;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s;}
  .tab.active{background:var(--text);color:#fff;}

  /* HORAS ACUMULADAS */
  .acc-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1.75rem;}
  .acc-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;}
  .acc-header h2{font-size:14px;font-weight:600;}
  .acc-header span{font-size:12px;color:var(--muted);}
  .acc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;}
  .acc-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;}
  .acc-card-name{font-size:13px;font-weight:600;margin-bottom:1px;}
  .acc-card-role{font-size:10px;color:var(--muted);margin-bottom:8px;}
  .acc-card-total{font-size:22px;font-weight:600;font-family:'DM Mono',monospace;color:var(--accent);line-height:1;}
  .acc-card-unit{font-size:13px;color:var(--muted);}
  .acc-card-adj{font-size:11px;margin-top:4px;}
  .acc-card-adj.pos{color:#1e5c0a;} .acc-card-adj.neg{color:#a00;}
  .acc-bar-wrap{margin-top:8px;background:var(--border);border-radius:4px;height:4px;}
  .acc-bar{height:4px;border-radius:4px;background:var(--accent);}
  .acc-card-week{font-size:11px;color:var(--muted);margin-top:6px;}
  .adj-btn-row{display:flex;gap:4px;margin-top:8px;}

  /* WEEK NAV */
  .week-nav{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;}
  .week-label{font-size:15px;font-weight:500;flex:1;text-align:center;}
  .week-sub{font-size:12px;color:var(--muted);display:block;text-align:center;margin-top:1px;}

  .legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.25rem;}
  .leg{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);}
  .leg-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0;}

  /* TABLE */
  .table-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--border);background:var(--surface);margin-bottom:1.5rem;box-shadow:0 1px 4px rgba(0,0,0,.04);}
  table{width:100%;border-collapse:collapse;table-layout:fixed;min-width:640px;}
  thead th{padding:10px 6px;font-size:11px;font-weight:600;color:var(--muted);text-align:center;border-bottom:1px solid var(--border);letter-spacing:.04em;text-transform:uppercase;}
  thead th:first-child{text-align:left;padding-left:16px;width:150px;}
  thead th.today-col{color:var(--accent);}
  tbody tr{border-bottom:1px solid var(--border);}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:#faf9f6;}
  tbody td{padding:10px 6px;text-align:center;vertical-align:middle;}
  tbody td:first-child{text-align:left;padding-left:16px;}
  .today-cell{background:#edf3fc!important;}
  .emp-name{font-size:13px;font-weight:600;}
  .emp-role{font-size:11px;color:var(--muted);margin-top:1px;}
  .emp-acc{font-size:10px;color:var(--accent);font-family:'DM Mono',monospace;margin-top:3px;}
  .pill{border-radius:6px;padding:3px 6px;font-size:11px;font-weight:500;display:inline-block;min-width:52px;border:1px solid transparent;}
  .pill-M{background:var(--M-bg);color:var(--M-text);border-color:var(--M-border);}
  .pill-T{background:var(--T-bg);color:var(--T-text);border-color:var(--T-border);}
  .pill-OFF{background:var(--OFF-bg);color:var(--OFF-text);border-color:var(--OFF-border);}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:2rem;}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;}
  .stat-label{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
  .stat-value{font-size:24px;font-weight:600;}
  .stat-sub{font-size:11px;color:var(--muted);margin-top:2px;}

  /* MONTHLY */
  .month-nav{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;}
  .month-label{font-size:15px;font-weight:500;flex:1;text-align:center;}
  .month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1.5rem;}
  .month-day-hdr{text-align:center;font-size:11px;font-weight:600;color:var(--muted);padding:4px 0;text-transform:uppercase;letter-spacing:.04em;}
  .month-cell{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:6px 5px;min-height:88px;}
  .month-cell.inactive{background:var(--bg);border-color:transparent;}
  .month-cell.before-start{opacity:.35;}
  .month-cell.today-month{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
  .month-date{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;}
  .month-date.is-today{color:var(--accent);}
  .month-pill{font-size:9px;font-weight:500;border-radius:4px;padding:1px 4px;margin-bottom:2px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mp-M{background:var(--M-bg);color:var(--M-text);}
  .mp-T{background:var(--T-bg);color:var(--T-text);}
  .mp-OFF{background:var(--OFF-bg);color:var(--OFF-text);}

  /* VISTA POR EMPLEADO */
  .emp-select-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center;}
  .emp-select-bar label{font-size:13px;color:var(--muted);font-weight:500;}
  .emp-select-bar select{border:1px solid var(--border2);border-radius:var(--radius);padding:7px 12px;font-family:inherit;font-size:13px;background:var(--surface);color:var(--text);cursor:pointer;}
  .emp-select-bar select:focus{outline:none;border-color:var(--accent);}
  .emp-profile{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
  .emp-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;flex-shrink:0;}
  .emp-profile-info h3{font-size:16px;font-weight:600;}
  .emp-profile-info p{font-size:13px;color:var(--muted);margin-top:2px;}
  .emp-month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:1.5rem;}
  .emp-day-hdr{text-align:center;font-size:10px;font-weight:600;color:var(--muted);padding:3px 0;text-transform:uppercase;}
  .emp-day{border-radius:6px;padding:6px 4px;text-align:center;min-height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:1px solid transparent;}
  .emp-day.inactive{opacity:0;}
  .emp-day.before-start{opacity:.25;}
  .emp-day-num{font-size:12px;font-weight:600;color:var(--muted);}
  .emp-day-num.is-today{color:var(--accent);}
  .emp-day-shift{font-size:10px;font-weight:600;}
  .emp-day.d-M{background:var(--M-bg);border-color:var(--M-border);}
  .emp-day.d-M .emp-day-num{color:var(--M-text);}
  .emp-day.d-M .emp-day-shift{color:var(--M-text);}
  .emp-day.d-T{background:var(--T-bg);border-color:var(--T-border);}
  .emp-day.d-T .emp-day-num{color:var(--T-text);}
  .emp-day.d-T .emp-day-shift{color:var(--T-text);}
  .emp-day.d-OFF{background:var(--OFF-bg);border-color:var(--OFF-border);}
  .emp-day.d-OFF .emp-day-num{color:var(--OFF-text);}
  .emp-day.d-OFF .emp-day-shift{color:var(--OFF-text);}
  .emp-day.d-today{box-shadow:0 0 0 2px var(--accent);}
  .emp-month-nav{display:flex;align-items:center;gap:12px;margin-bottom:1rem;}
  .emp-month-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:1.5rem;}

  /* SETTINGS */
  .settings-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:none;}
  .settings-panel.open{display:block;}
  .settings-panel h3{font-size:14px;font-weight:600;margin-bottom:1rem;}
  .settings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;}
  .setting-row{display:flex;flex-direction:column;gap:4px;}
  .setting-row label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
  .setting-row input{border:1px solid var(--border2);border-radius:var(--radius);padding:7px 10px;font-family:inherit;font-size:13px;background:var(--bg);color:var(--text);}
  .setting-row input:focus{outline:none;border-color:var(--accent);}

  /* MODAL */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;}
  .modal-bg.open{display:flex;}
  .modal{background:var(--surface);border-radius:var(--radius-lg);padding:1.5rem;width:380px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto;}
  .modal h3{font-size:15px;font-weight:600;margin-bottom:4px;}
  .modal p{font-size:13px;color:var(--muted);margin-bottom:1.25rem;}
  .modal-row{display:flex;flex-direction:column;gap:4px;margin-bottom:1rem;}
  .modal-row label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
  .modal-row input,.modal-row select,.modal-row textarea{border:1px solid var(--border2);border-radius:var(--radius);padding:8px 10px;font-family:inherit;font-size:13px;background:var(--bg);color:var(--text);width:100%;}
  .modal-row textarea{resize:vertical;min-height:60px;}
  .modal-row input:focus,.modal-row select:focus,.modal-row textarea:focus{outline:none;border-color:var(--accent);}
  .modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;}
  .adj-history{margin-top:1rem;}
  .adj-history h4{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
  .adj-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
  .adj-item:last-child{border-bottom:none;}
  .adj-badge{border-radius:4px;padding:2px 6px;font-weight:600;font-size:11px;flex-shrink:0;}
  .adj-badge.pos{background:var(--M-bg);color:var(--M-text);}
  .adj-badge.neg{background:#fee;color:#a00;}
  .adj-date{color:var(--muted);font-size:11px;}
  .adj-note{color:var(--muted);font-size:11px;margin-top:1px;}

  .info-bar{font-size:12px;color:var(--muted);background:var(--OFF-bg);border:1px solid var(--OFF-border);border-radius:var(--radius);padding:8px 14px;margin-bottom:1rem;display:none;align-items:center;gap:6px;}

  /* PRINT */
  @media print{
    body{background:#fff;padding:0.5rem;font-size:11px;}
    .no-print{display:none!important;}
    .acc-panel{break-inside:avoid;}
    .table-wrap{box-shadow:none;border:1px solid #ccc;break-inside:avoid;}
    .stats{break-inside:avoid;}
    .emp-month-grid{break-inside:avoid;}
    .print-header{display:block!important;}
  }
  .print-header{display:none;font-size:12px;color:#666;margin-bottom:0.5rem;}
</style>
</head>
<body>

<div class="hdr">
  <div class="header-left">
    <h1>Boutique de la Plage</h1>
    <p>Horarios temporada · Mañana 10:00–16:30 · Tarde 16:30–23:00 · Desde 1 julio 2026</p>
  </div>
  <div class="hdr-btns no-print">
    <button class="btn" onclick="toggleSettings()">⚙ Configurar</button>
    <button class="btn btn-primary" onclick="exportPDF()">⬇ Exportar PDF</button>
  </div>
</div>

<!-- SETTINGS -->
<div class="settings-panel" id="settingsPanel">
  <h3>Nombres del equipo</h3>
  <div class="settings-grid" id="settingsGrid"></div>
  <div style="margin-top:1rem;display:flex;gap:8px;flex-wrap:wrap;">
    <button class="btn btn-primary" onclick="saveSettings()">Guardar nombres</button>
    <button class="btn btn-danger btn-sm" onclick="resetAdjs()">Reiniciar ajustes de horas</button>
  </div>
</div>

<!-- HORAS ACUMULADAS -->
<div class="acc-panel">
  <div class="acc-header">
    <h2 id="accTitle">Horas acumuladas</h2>
    <span id="accSubtitle"></span>
  </div>
  <div class="acc-grid" id="hoursGrid"></div>
</div>

<!-- TABS -->
<div class="tabs no-print">
  <button class="tab active" id="tab-weekly"  onclick="switchTab('weekly',this)">Semana</button>
  <button class="tab"        id="tab-monthly" onclick="switchTab('monthly',this)">Mes</button>
  <button class="tab"        id="tab-emp"     onclick="switchTab('emp',this)">Por empleado</button>
</div>

<!-- WEEKLY -->
<div id="weeklyView">
  <div class="week-nav">
    <button class="btn no-print" onclick="changeWeek(-1)">← Anterior</button>
    <div><div class="week-label" id="weekLabel"></div><span class="week-sub" id="weekNum"></span></div>
    <button class="btn no-print" onclick="changeWeek(1)">Siguiente →</button>
  </div>
  <div class="info-bar" id="infoBar"><span id="infoText"></span></div>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:var(--M-bg);border:1px solid var(--M-border)"></div>Mañana (10–16:30)</div>
    <div class="leg"><div class="leg-dot" style="background:var(--T-bg);border:1px solid var(--T-border)"></div>Tarde (16:30–23)</div>
    <div class="leg"><div class="leg-dot" style="background:var(--OFF-bg);border:1px solid var(--OFF-border)"></div>Festivo</div>
  </div>
  <div class="table-wrap">
    <table><thead><tr id="headerRow"></tr></thead><tbody id="scheduleBody"></tbody></table>
  </div>
  <div class="stats" id="statsRow"></div>
</div>

<!-- MONTHLY -->
<div id="monthlyView" style="display:none">
  <div class="month-nav no-print">
    <button class="btn" onclick="changeMonth(-1)">← Anterior</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="btn" onclick="changeMonth(1)">Siguiente →</button>
  </div>
  <div class="month-grid" id="monthGrid"></div>
</div>

<!-- POR EMPLEADO -->
<div id="empView" style="display:none">
  <div class="emp-select-bar no-print">
    <label>Empleado:</label>
    <select id="empSelect" onchange="renderEmpView()"></select>
  </div>
  <div id="empProfile" class="emp-profile"></div>
  <div class="emp-month-nav">
    <button class="btn no-print" onclick="changeEmpMonth(-1)">← Anterior</button>
    <div class="month-label" id="empMonthLabel"></div>
    <button class="btn no-print" onclick="changeEmpMonth(1)">Siguiente →</button>
  </div>
  <div class="emp-month-stats" id="empMonthStats"></div>
  <div class="emp-month-grid" id="empMonthGrid"></div>
</div>

<!-- MODAL AJUSTE -->
<div class="modal-bg" id="adjModal">
  <div class="modal">
    <h3 id="modalTitle">Ajustar horas</h3>
    <p id="modalSub"></p>
    <div class="modal-row">
      <label>Tipo de ajuste</label>
      <select id="adjType">
        <option value="extra">+ Horas extra</option>
        <option value="menos">− Horas a descontar</option>
      </select>
    </div>
    <div class="modal-row">
      <label>Horas (ej: 2 o 1.5)</label>
      <input type="number" id="adjHours" min="0.5" max="24" step="0.5" value="1">
    </div>
    <div class="modal-row">
      <label>Fecha</label>
      <input type="date" id="adjDate">
    </div>
    <div class="modal-row">
      <label>Motivo (opcional)</label>
      <textarea id="adjNote" placeholder="Ej: cierre por lluvia, horas extra San Juan…"></textarea>
    </div>
    <div id="adjHistory" class="adj-history" style="display:none"></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveAdj()">Guardar ajuste</button>
    </div>
  </div>
</div>

<script>
// ── DATOS ──────────────────────────────────────────────────────────────────
const REF_MONDAY = new Date(2026,5,29); REF_MONDAY.setHours(0,0,0,0);
const START_DATE = new Date(2026,6,1);  START_DATE.setHours(0,0,0,0);
const H = 6.5;
const DAYS_S    = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const AVATARS   = ['#deeaf8','#fae5d8','#ddf0d0','#faebd0','#e8e0f8','#fde8d8','#d8f0e8'];
const AV_TEXT   = ['#1a3d6e','#7a2e0e','#1e5c0a','#7a4a08','#3d1a6e','#6e3a1a','#0a5c3a'];

let EMPS = [
  {id:0,name:'Iciar',    role:'Fija mañanas',        fixedShift:'M',dayOff:4},
  {id:1,name:'Oihana',   role:'Fija tardes',         fixedShift:'T',dayOff:5},
  {id:2,name:'Leire B.', role:'Rotación ×2 (par A)', pairPhase:0,  dayOff:0},
  {id:3,name:'Iker G.',  role:'Rotación ×2 (par A)', pairPhase:1,  dayOff:1},
  {id:4,name:'Marta F.', role:'Rotación semanal',    rotId:0,      dayOff:2},
  {id:5,name:'Julien D.',role:'Rotación semanal',    rotId:1,      dayOff:3},
  {id:6,name:'Sofía P.', role:'Comodín cobertura',   cover:true,   dayOff:6},
];
try{const s=localStorage.getItem('bdp_names');if(s)JSON.parse(s).forEach((n,i)=>{if(EMPS[i])EMPS[i].name=n;});}catch(e){}

let ADJS=[];
try{const s=localStorage.getItem('bdp_adj');if(s)ADJS=JSON.parse(s);}catch(e){}

let weekOffset=0, monthOffset=0, empMonthOffset=0, currentTab='weekly', selectedEmp=0, modalEmpId=null;

// ── TURNOS ─────────────────────────────────────────────────────────────────
function getMondayOf(date){
  const d=new Date(date);d.setHours(0,0,0,0);
  const dow=d.getDay(),diff=dow===0?-6:1-dow;
  d.setDate(d.getDate()+diff);return d;
}
function wOff(date){return Math.round((getMondayOf(date)-REF_MONDAY)/(7*86400000));}
function baseShift(emp,wo){
  if(emp.fixedShift)return emp.fixedShift;
  if(emp.pairPhase!==undefined){const c=((wo%4)+4)%4;return(emp.pairPhase===0?c<2:c>=2)?'M':'T';}
  if(emp.rotId!==undefined)return(((wo+emp.rotId)%2+2)%2===0)?'M':'T';
  return'M';
}
function getShift(emp,date){
  const d=new Date(date);d.setHours(0,0,0,0);
  const dow=d.getDay(),di=dow===0?6:dow-1;
  if(di===emp.dayOff)return'OFF';
  const wo2=wOff(d);
  if(emp.cover){const r=EMPS.find(e=>!e.cover&&e.dayOff===di);return r?(baseShift(r,wo2)==='M'?'M':'T'):'M';}
  return baseShift(emp,wo2);
}
function works(t){return t==='M'||t==='T';}
function pilLabel(t){return{M:'Mañana',T:'Tarde',OFF:'Festivo'}[t]||'';}
function initials(name){return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function fmt(d){return d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'});}

// ── HORAS ──────────────────────────────────────────────────────────────────
function baseHours(empId,before){
  let h=0;const cur=new Date(START_DATE);const end=new Date(before);end.setHours(0,0,0,0);
  while(cur<end){if(works(getShift(EMPS[empId],cur)))h+=H;cur.setDate(cur.getDate()+1);}
  return h;
}
function adjHoursUntil(empId,before){
  const end=new Date(before);end.setHours(0,0,0,0);
  return ADJS.filter(a=>a.empId===empId&&new Date(a.date+'T12:00')<end).reduce((s,a)=>s+a.hours,0);
}
function totalAcc(empId,before){return baseHours(empId,before)+adjHoursUntil(empId,before);}
function saveAdjs(){try{localStorage.setItem('bdp_adj',JSON.stringify(ADJS));}catch(e){}}

// ── PANEL HORAS ────────────────────────────────────────────────────────────
function renderHours(weekHoursArr){
  const today=new Date();today.setHours(0,0,0,0);
  const before=today<START_DATE?START_DATE:today;
  const isBS=today<START_DATE;
  document.getElementById('accTitle').textContent=isBS?'Horas proyectadas al inicio':'Horas acumuladas desde el 1 de julio';
  const fd=before.toLocaleDateString('es-ES',{day:'2-digit',month:'long',year:'numeric'});
  document.getElementById('accSubtitle').textContent=isBS?'Temporada empieza el 1 jul 2026':`Al ${fd}`;
  const maxRef=26*H;
  const grid=document.getElementById('hoursGrid');grid.innerHTML='';
  EMPS.forEach((emp,i)=>{
    const acc=totalAcc(i,before);
    const adj=adjHoursUntil(i,before);
    const wh=weekHoursArr?weekHoursArr[i]:0;
    const pct=Math.min(100,Math.round((acc/maxRef)*100));
    const adjL=adj!==0?`<div class="acc-card-adj ${adj>0?'pos':'neg'}">${adj>0?'+':''}${adj.toFixed(1)}h ajustes</div>`:'';
    grid.innerHTML+=`<div class="acc-card">
      <div class="acc-card-name">${emp.name}</div>
      <div class="acc-card-role">${emp.role}</div>
      <div class="acc-card-total">${acc.toFixed(1)}<span class="acc-card-unit">h</span></div>
      <div style="font-size:10px;color:var(--muted);margin-top:1px;">acumuladas</div>
      ${adjL}
      <div class="acc-bar-wrap"><div class="acc-bar" style="width:${pct}%"></div></div>
      ${weekHoursArr?`<div class="acc-card-week">Esta semana: <strong>${wh.toFixed(1)}h</strong></div>`:''}
      <div class="adj-btn-row no-print">
        <button class="btn btn-sm" onclick="openModal(${i})">＋／－ Ajustar</button>
      </div>
    </div>`;
  });
}

// ── MODAL ──────────────────────────────────────────────────────────────────
function openModal(empId){
  modalEmpId=empId;
  document.getElementById('modalTitle').textContent='Ajustar horas — '+EMPS[empId].name;
  document.getElementById('modalSub').textContent='Añade o descuenta horas puntuales';
  const today=new Date();
  document.getElementById('adjDate').value=(today<START_DATE?START_DATE:today).toISOString().slice(0,10);
  document.getElementById('adjHours').value='1';
  document.getElementById('adjType').value='extra';
  document.getElementById('adjNote').value='';
  const adjs=ADJS.filter(a=>a.empId===empId).sort((a,b)=>b.date.localeCompare(a.date));
  const hDiv=document.getElementById('adjHistory');
  if(adjs.length){
    hDiv.style.display='block';
    hDiv.innerHTML='<h4>Ajustes anteriores</h4>'+adjs.map(a=>`
      <div class="adj-item">
        <span class="adj-badge ${a.hours>0?'pos':'neg'}">${a.hours>0?'+':''}${a.hours.toFixed(1)}h</span>
        <div>
          <div class="adj-date">${new Date(a.date+'T12:00').toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'})}</div>
          ${a.note?`<div class="adj-note">${a.note}</div>`:''}
        </div>
        <button class="btn btn-sm btn-danger" style="margin-left:auto;padding:2px 8px;font-size:11px" onclick="deleteAdj(${ADJS.indexOf(a)})">✕</button>
      </div>`).join('');
  } else { hDiv.style.display='none'; hDiv.innerHTML=''; }
  document.getElementById('adjModal').classList.add('open');
}
function closeModal(){document.getElementById('adjModal').classList.remove('open');modalEmpId=null;}
function saveAdj(){
  const type=document.getElementById('adjType').value;
  const rawH=parseFloat(document.getElementById('adjHours').value);
  const date=document.getElementById('adjDate').value;
  const note=document.getElementById('adjNote').value.trim();
  if(isNaN(rawH)||rawH<=0||!date){alert('Rellena las horas y la fecha.');return;}
  ADJS.push({empId:modalEmpId,date,hours:type==='extra'?rawH:-rawH,note});
  saveAdjs();closeModal();renderAll();
}
function deleteAdj(idx){
  if(!confirm('¿Eliminar este ajuste?'))return;
  ADJS.splice(idx,1);saveAdjs();closeModal();renderAll();
}
document.getElementById('adjModal').addEventListener('click',function(e){if(e.target===this)closeModal();});

// ── SEMANA ─────────────────────────────────────────────────────────────────
function getMondayOfWeek(off){const d=new Date(REF_MONDAY);d.setDate(REF_MONDAY.getDate()+off*7);return d;}
function getWeekNum(date){
  const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  const dn=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-dn);
  const ys=new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil((((d-ys)/86400000)+1)/7);
}
function calcWeekH(monday){
  return EMPS.map(emp=>{let h=0;for(let d=0;d<7;d++){const dt=new Date(monday);dt.setDate(monday.getDate()+d);if(dt<START_DATE)continue;if(works(getShift(emp,dt)))h+=H;}return h;});
}

function renderWeekly(){
  const monday=getMondayOfWeek(weekOffset);
  const sunday=new Date(monday);sunday.setDate(monday.getDate()+6);
  document.getElementById('weekLabel').textContent=fmt(monday)+' – '+fmt(sunday);
  document.getElementById('weekNum').textContent='Semana '+getWeekNum(monday)+' · '+monday.getFullYear();
  const today=new Date();today.setHours(0,0,0,0);
  const bar=document.getElementById('infoBar'),info=document.getElementById('infoText');
  if(sunday<START_DATE){info.textContent='La temporada aún no ha comenzado (arranca el 1 de julio 2026)';bar.style.display='flex';}
  else if(monday<START_DATE){info.textContent='La temporada arranca el 1 de julio en esta semana';bar.style.display='flex';}
  else bar.style.display='none';

  const weekH=calcWeekH(monday);
  renderHours(weekH);

  const hRow=document.getElementById('headerRow');
  hRow.innerHTML='<th>Empleado</th>';
  for(let d=0;d<7;d++){
    const dt=new Date(monday);dt.setDate(monday.getDate()+d);
    const isToday=dt.getTime()===today.getTime(),dim=dt<START_DATE;
    const resting=EMPS.find(e=>e.dayOff===d);
    hRow.innerHTML+=`<th class="${isToday?'today-col':''}" style="${dim?'opacity:.35':''}">
      ${DAYS_S[d]}<br><span style="font-weight:400;font-size:10px">${fmt(dt)}</span><br>
      <span style="font-weight:400;font-size:10px;color:${isToday?'#2a5fa5':'#9a9890'}">libre: ${resting?resting.name:''}</span>
    </th>`;
  }

  const body=document.getElementById('scheduleBody');body.innerHTML='';
  let tM=0,tT=0,tOff=0;
  EMPS.forEach((emp,i)=>{
    const tr=document.createElement('tr');
    let cells='';
    for(let d=0;d<7;d++){
      const dt=new Date(monday);dt.setDate(monday.getDate()+d);
      const dim=dt<START_DATE,isToday=dt.getTime()===today.getTime();
      const type=dim?null:getShift(emp,dt);
      if(!dim){if(type==='M')tM++;else if(type==='T')tT++;else if(type==='OFF')tOff++;}
      cells+=`<td class="${isToday?'today-cell':''}" style="${dim?'opacity:.2':''}">
        ${!dim&&type?`<span class="pill pill-${type}">${pilLabel(type)}</span>`:'–'}
      </td>`;
    }
    const wa=ADJS.filter(a=>{const ad=new Date(a.date+'T12:00');ad.setHours(0,0,0,0);return a.empId===i&&ad>=monday&&ad<=sunday;}).reduce((s,a)=>s+a.hours,0);
    tr.innerHTML=`<td>
      <div class="emp-name">${emp.name}</div>
      <div class="emp-role">${emp.role}</div>
      <div class="emp-acc">Esta semana: ${weekH[i].toFixed(1)}h${wa!==0?` (${wa>0?'+':''}${wa.toFixed(1)}h)`:''}</div>
    </td>${cells}`;
    body.appendChild(tr);
  });

  document.getElementById('statsRow').innerHTML=`
    <div class="stat"><div class="stat-label">Turnos mañana</div><div class="stat-value" style="color:var(--M-text)">${tM}</div><div class="stat-sub">esta semana</div></div>
    <div class="stat"><div class="stat-label">Turnos tarde</div><div class="stat-value" style="color:var(--T-text)">${tT}</div><div class="stat-sub">esta semana</div></div>
    <div class="stat"><div class="stat-label">Festivos</div><div class="stat-value">${tOff}</div><div class="stat-sub">esta semana</div></div>
    <div class="stat"><div class="stat-label">Horas equipo</div><div class="stat-value">${((tM+tT)*H).toFixed(0)}h</div><div class="stat-sub">esta semana</div></div>`;
}

// ── MES ────────────────────────────────────────────────────────────────────
function renderMonthly(){
  const base=new Date(2026,6+monthOffset,1);
  const yr=base.getFullYear(),mo=base.getMonth();
  document.getElementById('monthLabel').textContent=MONTHS_ES[mo]+' '+yr;
  const first=new Date(yr,mo,1),last=new Date(yr,mo+1,0);
  const today=new Date();today.setHours(0,0,0,0);
  let sdow=first.getDay()-1;if(sdow<0)sdow=6;
  const grid=document.getElementById('monthGrid');grid.innerHTML='';
  DAYS_S.forEach(d=>{grid.innerHTML+=`<div class="month-day-hdr">${d}</div>`;});
  for(let i=0;i<sdow;i++)grid.innerHTML+=`<div class="month-cell inactive"></div>`;
  for(let day=1;day<=last.getDate();day++){
    const date=new Date(yr,mo,day);date.setHours(0,0,0,0);
    const isToday=date.getTime()===today.getTime(),bs=date<START_DATE;
    let cls='month-cell'+(isToday?' today-month':'')+(bs?' before-start':'');
    let pills='';
    EMPS.forEach(emp=>{
      const t=getShift(emp,date);
      pills+=`<span class="month-pill mp-${t}" title="${emp.name}: ${pilLabel(t)}">${emp.name.split(' ')[0]} ${t==='OFF'?'🏖':t}</span>`;
    });
    grid.innerHTML+=`<div class="${cls}"><div class="month-date ${isToday?'is-today':''}">${day}</div>${pills}</div>`;
  }
  const rem=(sdow+last.getDate())%7;
  if(rem>0)for(let i=0;i<7-rem;i++)grid.innerHTML+=`<div class="month-cell inactive"></div>`;
  renderHours(null);
}

// ── VISTA POR EMPLEADO ─────────────────────────────────────────────────────
function buildEmpSelect(){
  const sel=document.getElementById('empSelect');sel.innerHTML='';
  EMPS.forEach((emp,i)=>sel.innerHTML+=`<option value="${i}">${emp.name} — ${emp.role}</option>`);
  sel.value=selectedEmp;
}

function renderEmpView(){
  selectedEmp=parseInt(document.getElementById('empSelect').value);
  const emp=EMPS[selectedEmp];

  // Perfil
  const av=AVATARS[selectedEmp%AVATARS.length];
  const avt=AV_TEXT[selectedEmp%AV_TEXT.length];
  const today=new Date();today.setHours(0,0,0,0);
  const before=today<START_DATE?START_DATE:today;
  const acc=totalAcc(selectedEmp,before);
  const adj=adjHoursUntil(selectedEmp,before);
  document.getElementById('empProfile').innerHTML=`
    <div class="emp-avatar" style="background:${av};color:${avt}">${initials(emp.name)}</div>
    <div class="emp-profile-info">
      <h3>${emp.name}</h3>
      <p>${emp.role} · Libra los ${['lunes','martes','miércoles','jueves','viernes','sábados','domingos'][emp.dayOff]}</p>
    </div>
    <div style="margin-left:auto;text-align:right;">
      <div style="font-size:24px;font-weight:600;font-family:'DM Mono',monospace;color:var(--accent)">${acc.toFixed(1)}<span style="font-size:14px;color:var(--muted)">h</span></div>
      <div style="font-size:11px;color:var(--muted);">acumuladas${adj!==0?` · <span style="color:${adj>0?'#1e5c0a':'#a00'}">${adj>0?'+':''}${adj.toFixed(1)}h ajustes</span>`:''}</div>
    </div>
    <div class="no-print"><button class="btn btn-sm" onclick="openModal(${selectedEmp})">＋／－ Ajustar horas</button></div>`;

  // Mes del empleado
  const base=new Date(2026,6+empMonthOffset,1);
  const yr=base.getFullYear(),mo=base.getMonth();
  document.getElementById('empMonthLabel').textContent=MONTHS_ES[mo]+' '+yr;

  const first=new Date(yr,mo,1),last=new Date(yr,mo+1,0);
  let sdow=first.getDay()-1;if(sdow<0)sdow=6;

  let mM=0,mT=0,mOff=0,mH=0;
  for(let d=1;d<=last.getDate();d++){
    const dt=new Date(yr,mo,d);if(dt<START_DATE)continue;
    const t=getShift(emp,dt);
    if(t==='M'){mM++;mH+=H;}else if(t==='T'){mT++;mH+=H;}else if(t==='OFF')mOff++;
  }
  const adjMonth=ADJS.filter(a=>{const d=new Date(a.date+'T12:00');return a.empId===selectedEmp&&d.getFullYear()===yr&&d.getMonth()===mo;}).reduce((s,a)=>s+a.hours,0);

  document.getElementById('empMonthStats').innerHTML=`
    <div class="stat"><div class="stat-label">Mañanas</div><div class="stat-value" style="color:var(--M-text)">${mM}</div><div class="stat-sub">este mes</div></div>
    <div class="stat"><div class="stat-label">Tardes</div><div class="stat-value" style="color:var(--T-text)">${mT}</div><div class="stat-sub">este mes</div></div>
    <div class="stat"><div class="stat-label">Festivos</div><div class="stat-value">${mOff}</div><div class="stat-sub">este mes</div></div>
    <div class="stat"><div class="stat-label">Horas base</div><div class="stat-value">${mH.toFixed(0)}h</div><div class="stat-sub">este mes</div></div>
    ${adjMonth!==0?`<div class="stat"><div class="stat-label">Ajustes</div><div class="stat-value" style="color:${adjMonth>0?'#1e5c0a':'#a00'}">${adjMonth>0?'+':''}${adjMonth.toFixed(1)}h</div><div class="stat-sub">este mes</div></div>`:''}`;

  // Calendario personal
  const grid=document.getElementById('empMonthGrid');grid.innerHTML='';
  DAYS_S.forEach(d=>{grid.innerHTML+=`<div class="emp-day-hdr">${d}</div>`;});
  for(let i=0;i<sdow;i++)grid.innerHTML+=`<div class="emp-day inactive"></div>`;
  for(let day=1;day<=last.getDate();day++){
    const date=new Date(yr,mo,day);date.setHours(0,0,0,0);
    const isToday=date.getTime()===today.getTime(),bs=date<START_DATE;
    const t=getShift(emp,date);
    const shortLabel=t==='OFF'?'Libre':t==='M'?'Mañana':'Tarde';
    grid.innerHTML+=`<div class="emp-day d-${t}${isToday?' d-today':''}${bs?' before-start':''}">
      <div class="emp-day-num ${isToday?'is-today':''}">${day}</div>
      <div class="emp-day-shift">${shortLabel}</div>
    </div>`;
  }
  const rem=(sdow+last.getDate())%7;
  if(rem>0)for(let i=0;i<7-rem;i++)grid.innerHTML+=`<div class="emp-day inactive"></div>`;
}

// ── EXPORT PDF ─────────────────────────────────────────────────────────────
function exportPDF(){
  // Elegir qué exportar
  const choice=prompt('¿Qué quieres exportar?\n1 — Vista de semana actual\n2 — Vista de mes actual\n3 — Ficha de empleado (vista actual)\n\nEscribe 1, 2 o 3:');
  if(!choice)return;

  const c=choice.trim();
  if(c==='1'){
    document.querySelectorAll('.tabs .tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('tab-weekly').classList.add('active');
    showView('weeklyView');
    renderWeekly();
  } else if(c==='2'){
    document.querySelectorAll('.tabs .tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('tab-monthly').classList.add('active');
    showView('monthlyView');
    renderMonthly();
  } else if(c==='3'){
    document.querySelectorAll('.tabs .tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('tab-emp').classList.add('active');
    showView('empView');
    renderEmpView();
  } else { alert('Opción no válida'); return; }

  setTimeout(()=>window.print(),200);
}

// ── SETTINGS ───────────────────────────────────────────────────────────────
function buildSettings(){
  const g=document.getElementById('settingsGrid');g.innerHTML='';
  EMPS.forEach((emp,i)=>{g.innerHTML+=`<div class="setting-row"><label>${emp.role}</label><input type="text" id="ei-${i}" value="${emp.name}"></div>`;});
}
function saveSettings(){
  EMPS.forEach((emp,i)=>{const el=document.getElementById('ei-'+i);if(el)emp.name=el.value.trim()||emp.name;});
  try{localStorage.setItem('bdp_names',JSON.stringify(EMPS.map(e=>e.name)));}catch(e){}
  if(currentTab==='emp')buildEmpSelect();
  toggleSettings();renderAll();
}
function toggleSettings(){
  const p=document.getElementById('settingsPanel');
  if(!p.classList.contains('open'))buildSettings();
  p.classList.toggle('open');
}
function resetAdjs(){
  if(!confirm('¿Borrar todos los ajustes de horas guardados?'))return;
  ADJS=[];saveAdjs();renderAll();toggleSettings();
}

// ── TABS & NAV ─────────────────────────────────────────────────────────────
function showView(id){
  ['weeklyView','monthlyView','empView'].forEach(v=>document.getElementById(v).style.display=v===id?'block':'none');
}
function switchTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  if(tab==='emp'){showView('empView');buildEmpSelect();renderEmpView();}
  else if(tab==='monthly'){showView('monthlyView');renderMonthly();}
  else{showView('weeklyView');renderWeekly();}
}
function changeWeek(d){weekOffset+=d;renderWeekly();}
function changeMonth(d){monthOffset+=d;renderMonthly();}
function changeEmpMonth(d){empMonthOffset+=d;renderEmpView();}

function renderAll(){
  renderHours(currentTab==='weekly'?calcWeekH(getMondayOfWeek(weekOffset)):null);
  if(currentTab==='weekly')renderWeekly();
  else if(currentTab==='monthly')renderMonthly();
  else renderEmpView();
}

// Init
const nowI=new Date();nowI.setHours(0,0,0,0);
weekOffset=nowI<START_DATE?0:Math.round((getMondayOf(nowI)-REF_MONDAY)/(7*86400000));
renderWeekly();
</script>
